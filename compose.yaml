services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xagora}
      POSTGRES_USER: ${POSTGRES_USER:-xagora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xagora_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  xagora:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${XAGORA_IMAGE:-xagora:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-xagora}:${POSTGRES_PASSWORD:-xagora_change_me}@postgres:5432/${POSTGRES_DB:-xagora}
      BLACKSTONE_LLM_ENABLED: ${BLACKSTONE_LLM_ENABLED:-0}
      BLACKSTONE_LLM_BASE_URL: ${BLACKSTONE_LLM_BASE_URL:-}
      BLACKSTONE_LLM_AUTH_TOKEN: ${BLACKSTONE_LLM_AUTH_TOKEN:-}
      BLACKSTONE_LLM_MODEL: ${BLACKSTONE_LLM_MODEL:-}
    ports:
      - "${XAGORA_SSH_PORT:-2222}:2222"
    volumes:
      - xagora-state:/var/lib/xagora
    healthcheck:
      test: ["CMD", "xagora", "admin", "--socket", "/var/lib/xagora/admin.sock", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  xagora-state:
