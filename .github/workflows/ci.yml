name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/hinemos_ci
  HINEMOS_MAIL_DOMAIN: hinemos.local

jobs:
  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check workspace formatting
        run: cargo fmt --all --check

      - name: Check landing formatting
        run: cargo fmt --manifest-path web/landing/Cargo.toml --check

  clippy:
    name: Rust clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Lint landing
        run: cargo clippy --manifest-path web/landing/Cargo.toml --all-targets -- -D warnings

  test:
    name: Rust tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hinemos_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hinemos_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check workspace
        run: cargo check --workspace

      - name: Check landing
        run: cargo check --manifest-path web/landing/Cargo.toml

      - name: Run library tests
        run: cargo test --workspace --lib

      - name: Compile integration tests
        run: cargo test --workspace --tests --no-run

      - name: Run mail sidecar integration smoke
        run: cargo test -p hinemos-cli --test mail_sidecar smtp_and_imap_sidecar_use_mail_token_auth_and_share_mailbox -- --nocapture
